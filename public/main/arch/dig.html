<h1>dig</h1>

<p style="margin-bottom: 6px"></p>
<pre style="margin-top: 6px"><code class="language-bash">dig domain-name.ru +noall +answer
  # syu.su.			600	IN	A	193.187.94.218
</code></pre>
<ul>
   <li><strong><i>+noal</i></strong> – убирает весь вывод</li>
   <li><strong><i>+answer</i></strong> – добавляет только секцию "Answer"</li>
   <li><strong><i>+nocmd</i></strong> – скрывает первую строку вывода с номером версии</li>
</ul>
