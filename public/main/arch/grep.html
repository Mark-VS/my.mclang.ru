<h1>grep</h1>

<p style="margin-bottom: 6px">Хочу найти строку "col-header" в папке <strong><i>./web</i></strong>:</p>
<pre style="margin-top: 6px"><code class="language-bash">
grep -R "col-header" ./web

# Допустим, у меня внутри ./web есть папка node_modules
# Я хочу её исключить из поиска:
grep -R "col-header" ./web --exclude-dir=node_modules
</code></pre>
